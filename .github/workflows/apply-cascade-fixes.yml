name: Apply cascade fixes

on:
  push:
    branches:
      - fix/cascade-import-and-installer-hardening
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/cascade-import-and-installer-hardening
          fetch-depth: 0

      - name: Apply source changes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('.github/scripts/apply_cascade_fixes.py')
          text = p.read_text()
          replacements = {
              'updated, count = re.subn(pattern, replacement, text, count=1, flags=flags)':
                  'updated, count = re.subn(pattern, lambda _match: replacement, text, count=1, flags=flags)',
              "r'# \\[8/10\\] Настройка BBR TCP Congestion Control.*?# \\[9/10\\] Загрузка данных'":
                  "r'# \\[8/10\\] Оптимизация TCP \\(BBR\\).*?# \\[9/10\\] Загрузка данных'",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'patch generator anchor not found: {old}')
              text = text.replace(old, new, 1)
          p.write_text(text)
          PY
          if ! python3 .github/scripts/apply_cascade_fixes.py > /tmp/patch-generator.log 2>&1; then
            cat /tmp/patch-generator.log
            cp /tmp/patch-generator.log PATCH_GENERATOR_ERROR.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add PATCH_GENERATOR_ERROR.txt
            git commit -m "chore: persist patch generator error"
            git push origin HEAD:fix/cascade-import-and-installer-hardening
            exit 1
          fi

      - name: Validate shell syntax
        run: |
          chmod +x validation/test-cascade-upstream-import.sh validation/test-installer-network-fallbacks.sh
          bash -n xrayebator install.sh update.sh uninstall.sh \
            validation/test-cascade-upstream-import.sh \
            validation/test-installer-network-fallbacks.sh \
            validation/test-cascade-routing.sh \
            validation/test-update-xray-core-sync.sh

      - name: Run regression tests
        run: |
          bash validation/test-cascade-upstream-import.sh
          bash validation/test-installer-network-fallbacks.sh
          bash validation/test-cascade-routing.sh
          bash validation/test-update-xray-core-sync.sh
          bash validation/test-vless-url-generation.sh
          bash validation/test-happ-subscription-static.sh

      - name: Commit generated changes
        run: |
          rm -f .github/workflows/apply-cascade-fixes.yml
          rm -f .github/scripts/apply_cascade_fixes.py
          rm -f PATCH_GENERATOR_ERROR.txt
          git config user.name "ShalomGH"
          git config user.email "58379599+ShalomGH@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden cascade upstream import and installation"
          git push origin HEAD:fix/cascade-import-and-installer-hardening
